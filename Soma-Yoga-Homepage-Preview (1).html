  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

9b4;\n    --teal-dark:#238a93;\n    --gold:#c9a876;\n    --gold-soft:#d8bf97;\n    --cream:#f4efe8;\n    --cream-2:#ece6db;\n    --paper:#faf7f2;\n    --ink:#2c2c2c;\n    --ink-soft:#4a4a4a;\n    --muted:#7b7873;\n    --line:#e4ddd0;\n    --serif:'Playfair Display', 'Georgia', serif;\n    --sans:'Lato','Helvetica Neue',Arial,sans-serif;\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  html,body{background:#fff;color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased}\n  img{max-width:100%;display:block}\n  a{color:inherit;text-decoration:none}\n  .wrap{max-width:1200px;margin:0 auto;padding:0 32px}\n  .wrap-sm{max-width:980px;margin:0 auto;padding:0 32px}\n\n  /* ——— type helpers ——— */\n  .eyebrow{font-family:var(--sans);font-weight:700;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--teal)}\n  .eyebrow--light{color:var(--teal)}\n  .eyebrow--gold{color:var(--gold)}\n  h1,h2,h3,h4{font-family:var(--serif);font-weight:500;color:var(--navy);line-height:1.15;letter-spacing:-.005em}\n  .h-display{font-size:64px;line-height:1.08;font-weight:500}\n  .h-display em{font-style:italic;color:var(--purple);font-weight:500}\n  h2.section-title{font-size:44px;font-weight:500;text-align:center}\n  h2.section-title em{font-style:italic;color:var(--purple);font-weight:500}\n  .rule{width:56px;height:2px;background:var(--gold);margin:20px auto 24px}\n  .rule-left{width:56px;height:2px;background:var(--gold);margin:16px 0 20px}\n  .section-lede{max-width:620px;margin:0 auto;text-align:center;color:var(--ink-soft);font-size:17px;line-height:1.7}\n\n  /* ——— buttons ——— */\n  .btn{display:inline-flex;align-items:center;gap:10px;padding:15px 28px;font-family:var(--sans);font-weight:700;font-size:12px;letter-spacing:.18em;text-transform:uppercase;border-radius:3px;border:0;cursor:pointer;transition:all .18s ease}\n  .btn .arr{transition:transform .18s ease}\n  .btn:hover .arr{transform:translateX(3px)}\n  .btn--purple{background:var(--purple);color:#fff}\n  .btn--purple:hover{background:var(--purple-deep)}\n  .btn--teal{background:var(--teal);color:#fff}\n  .btn--teal:hover{background:var(--teal-dark)}\n  .btn--gold{background:var(--gold);color:var(--navy-deep)}\n  .btn--gold:hover{background:var(--gold-soft)}\n  .btn--ghost{background:transparent;color:var(--navy);border:1px solid var(--navy)}\n  .btn--ghost:hover{background:var(--navy);color:#fff}\n  .btn--ghost-light{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.5)}\n  .btn--ghost-light:hover{background:#fff;color:var(--navy)}\n\n  /* ——— unified top nav ——— */\n  .topnav{background:#fff;border-bottom:1px solid var(--line);padding:18px 0}\n  .topnav-inner{display:flex;align-items:center;justify-content:space-between;gap:32px}\n  .topnav-menu{display:flex;gap:28px;align-items:center;font-size:14px}\n  .topnav-menu a{color:var(--ink);font-weight:500;letter-spacing:.01em;transition:color .15s ease;white-space:nowrap}\n  .topnav-menu a:hover{color:var(--purple)}\n  .topnav-menu a.has-sub::after{content:\"▾\";color:var(--muted);font-size:9px;margin-left:5px;vertical-align:middle}\n  .topnav-right{display:flex;align-items:center;gap:20px}\n  .topnav-right .login{font-size:13px;color:var(--ink-soft);white-space:nowrap}\n  .topnav-right .login:hover{color:var(--navy)}\n  .topnav-right .btn{padding:12px 22px;font-size:11px}\n\n  .logo{display:flex;align-items:center;gap:12px;font-family:var(--serif);color:var(--purple);font-size:24px;font-weight:500;white-space:nowrap}\n  .logo-mark{width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 50% 50%,#fff 0 8px,#2ba9b4 8px 12px,#fff 12px 14px,#4a2458 14px 22px);display:inline-block;position:relative;flex:none}\n  .logo-mark::after{content:\"\";position:absolute;inset:6px;border-radius:50%;border:1.5px solid rgba(255,255,255,.6)}\n  .logo .logo-wordmark{display:inline-flex;flex-direction:column;line-height:1;gap:4px;white-space:nowrap}\n  .logo small{display:block;font-family:var(--sans);letter-spacing:.32em;font-size:9px;color:var(--purple);text-transform:uppercase;white-space:nowrap}\n  .tricolor{height:3px;background:linear-gradient(90deg,var(--purple) 0,var(--purple) 33%,var(--gold) 33%,var(--gold) 66%,var(--teal) 66%,var(--teal) 100%)}\n\n  /* ——— hero ——— */\n  .hero{position:relative;min-height:720px;display:flex;align-items:center;justify-content:center;overflow:hidden;color:#fff;text-align:center}\n  .hero-bg{position:absolute;inset:0;background:\n      linear-gradient(180deg,rgba(13,31,51,.65) 0%,rgba(13,31,51,.55) 40%,rgba(13,31,51,.75) 100%),\n      repeating-linear-gradient(45deg,#3a5070 0 14px,#2e4561 14px 28px)}\n  .hero-bg::after{content:\"photo · hero · studio class in warrior pose\";position:absolute;left:24px;bottom:18px;font-family:'SFMono-Regular',ui-monospace,Menlo,monospace;font-size:11px;background:rgba(255,255,255,.85);padding:5px 10px;border-radius:2px;color:#3a2d15;letter-spacing:.04em}\n  .hero-inner{position:relative;padding:140px 32px;max-width:960px}\n  .hero .eyebrow{color:#72d5dc;margin-bottom:22px;display:block}\n  .hero h1{color:#fff;font-size:76px;line-height:1.06}\n  .hero h1 em{color:#e0c99a;font-style:italic}\n  .hero .rule{background:var(--gold);margin:26px auto 22px}\n  .hero-sub{font-family:var(--serif);font-style:italic;color:#eadfc9;font-size:22px;margin-bottom:10px}\n  .hero-lede{max-width:620px;margin:18px auto 34px;color:#efe8d8;font-size:18px;line-height:1.65}\n  .hero-ctas{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}\n\n  /* ——— trust strip ——— */\n  .trust{background:var(--navy);color:#fff;padding:22px 0}\n  .trust-row{display:grid;grid-template-columns:repeat(5,1fr);gap:24px;align-items:center}\n  .trust-cell{display:flex;gap:14px;align-items:center;justify-content:center;text-align:left}\n  .trust-ico{width:36px;height:36px;color:var(--gold);flex:none}\n  .trust-num{font-family:var(--serif);font-size:22px;font-weight:600;color:#fff;line-height:1}\n  .trust-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#9fb9d1;margin-top:4px}\n\n  /* ——— trainings (3-up) ——— */\n  .sec{padding:100px 0}\n  .sec--cream{background:var(--cream)}\n  .sec--paper{background:var(--paper)}\n  .sec-head{text-align:center;margin-bottom:60px}\n  .tr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}\n  .tr-card{background:#fff;border:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;transition:transform .25s ease, box-shadow .25s ease}\n  .tr-card:hover{transform:translateY(-4px);box-shadow:0 18px 40px -20px rgba(13,31,51,.25)}\n  .tr-photo{aspect-ratio:4/3;background:repeating-linear-gradient(45deg,#dcd2bf 0 10px,#d2c6ad 10px 20px);position:relative;color:#6b5e44;display:flex;align-items:flex-end;justify-content:space-between;padding:16px}\n  .tr-photo small{font-family:'SFMono-Regular',ui-monospace,Menlo,monospace;font-size:11px;background:rgba(255,255,255,.82);padding:4px 8px;border-radius:2px;letter-spacing:.05em}\n  .tr-tag{position:absolute;top:14px;right:14px;background:#fff;color:var(--teal);font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;padding:6px 10px;border-radius:999px}\n  .tr-body{padding:30px 28px 28px;display:flex;flex-direction:column;flex:1}\n  .tr-body .eyebrow{margin-bottom:10px}\n  .tr-body h3{font-size:26px;font-weight:600;line-height:1.2;margin-bottom:8px}\n  .tr-body h3 em{font-style:italic;color:var(--purple)}\n  .tr-body p.lede{color:var(--ink-soft);font-size:15px;margin:6px 0 18px}\n  .tr-bullets{list-style:none;margin:0 0 22px;padding:0;display:flex;flex-direction:column;gap:8px}\n  .tr-bullets li{display:flex;gap:10px;align-items:flex-start;font-size:14px;color:var(--ink-soft)}\n  .tr-bullets li::before{content:\"→\";color:var(--gold);font-weight:700;flex:none;margin-top:1px}\n  .tr-foot{margin-top:auto;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line);padding-top:18px}\n  .tr-price{display:flex;flex-direction:column;gap:2px}\n  .tr-price .lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}\n  .tr-price .val{font-family:var(--serif);color:var(--navy);font-size:22px;font-weight:600}\n  .tr-price .val em{color:var(--gold);font-style:normal;font-size:13px;font-weight:500;margin-left:4px}\n  .tr-cta{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--purple);font-weight:700;display:inline-flex;gap:8px;align-items:center}\n  .tr-cta:hover .arr{transform:translateX(3px)}\n  .tr-cta .arr{transition:transform .18s ease}\n\n  /* ——— why soma strip ——— */\n  .why{padding:80px 0;background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}\n  .why-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:36px}\n  .why-cell{text-align:center}\n  .why-ico{width:44px;height:44px;margin:0 auto 18px;color:var(--teal)}\n  .why-cell h4{font-size:18px;color:var(--navy);font-weight:600;margin-bottom:6px}\n  .why-cell p{color:var(--ink-soft);font-size:14px;line-height:1.6}\n\n  /* ——— YACEP (navy) ——— */\n  .yacep{background:linear-gradient(180deg,#112a46 0%,#0d2039 100%);color:#fff;padding:110px 0;position:relative;overflow:hidden}\n  .yacep::before{content:\"\";position:absolute;right:-120px;top:50%;width:520px;height:520px;border-radius:50%;border:1px solid rgba(255,255,255,.06);transform:translateY(-50%)}\n  .yacep::after{content:\"\";position:absolute;right:-60px;top:50%;width:380px;height:380px;border-radius:50%;border:1px solid rgba(255,255,255,.08);transform:translateY(-50%)}\n  .yacep-inner{display:grid;grid-template-columns:1.1fr .9fr;gap:60px;align-items:center;position:relative;z-index:1}\n  .yacep h2{color:#fff;font-size:46px;font-weight:500;line-height:1.12}\n  .yacep h2 em{font-style:italic;color:var(--gold);font-weight:500}\n  .yacep .eyebrow{color:#72d5dc;display:block;margin-bottom:18px}\n  .yacep .rule-left{background:var(--gold)}\n  .yacep-lede{color:#c7d4e3;font-size:17px;line-height:1.7;margin-bottom:16px;max-width:540px}\n  .yacep-ctas{display:flex;gap:12px;flex-wrap:wrap;margin-top:28px}\n  .yacep-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);padding:32px;display:flex;flex-direction:column;gap:18px}\n  .yacep-card h4{color:#fff;font-family:var(--sans);font-size:13px;font-weight:700;letter-spacing:.18em;text-transform:uppercase}\n  .yacep-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:rgba(255,255,255,.06);font-size:14px;color:#d7e2ee}\n  .yacep-row strong{color:#fff;font-weight:600}\n  .yacep-row span{color:#9fb9d1;font-size:12px}\n\n  /* ——— testimonials ——— */\n  .testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:50px}\n  .testi{background:#fff;border-top:3px solid var(--purple);padding:32px 28px 28px;display:flex;flex-direction:column;gap:16px;box-shadow:0 2px 0 rgba(0,0,0,.02)}\n  .stars{color:var(--gold);letter-spacing:3px;font-size:15px}\n  .testi blockquote{font-family:var(--serif);font-style:italic;color:var(--ink);font-size:17px;line-height:1.55;quotes:\"\\201C\" \"\\201D\"}\n  .testi blockquote::before{content:open-quote;color:var(--gold);font-size:20px;margin-right:2px}\n  .testi blockquote::after{content:close-quote;color:var(--gold);font-size:20px;margin-left:2px}\n  .testi-foot{display:flex;gap:12px;align-items:center;margin-top:auto;padding-top:10px}\n  .testi-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#c9a876,#4a2458);flex:none}\n  .testi-name{font-weight:700;color:var(--navy);font-size:14px;line-height:1.2}\n  .testi-role{color:var(--teal);font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;margin-top:3px}\n\n  /* ——— split (About / Story) ——— */\n  .split{display:grid;grid-template-columns:1.05fr 1fr;gap:80px;align-items:center}\n  .split.reverse{grid-template-columns:1fr 1.05fr}\n  .split.reverse .split-copy{order:0}\n  .split.reverse .split-img{order:1}\n  .split-copy .eyebrow{display:block;margin-bottom:14px}\n  .split-copy h2{font-size:44px;font-weight:500;line-height:1.12}\n  .split-copy h2 em{font-style:italic;color:var(--purple)}\n  .split-copy p{color:var(--ink-soft);font-size:16px;line-height:1.75;margin:0 0 16px;max-width:520px}\n  .split-copy .cta{margin-top:14px}\n  .split-img{position:relative}\n  .split-img .frame{aspect-ratio:4/5;background:repeating-linear-gradient(135deg,#dcd2bf 0 12px,#cfc2a6 12px 24px);position:relative;border:1px solid #cfc2a6;box-shadow:12px 12px 0 var(--cream-2)}\n  .split-img .frame small{position:absolute;left:16px;bottom:16px;font-family:'SFMono-Regular',ui-monospace,Menlo,monospace;font-size:11px;background:rgba(255,255,255,.85);padding:5px 9px;border-radius:2px;color:#6b5e44;letter-spacing:.04em}\n\n  /* ——— final cta band ——— */\n  .final{background:linear-gradient(180deg,#0f2743 0%,#0a1a30 100%);color:#fff;padding:120px 0;position:relative;overflow:hidden}\n  .final::before{content:\"\";position:absolute;right:-200px;top:50%;width:700px;height:700px;border-radius:50%;border:1px solid rgba(255,255,255,.05);transform:translateY(-50%)}\n  .final::after{content:\"\";position:absolute;right:-100px;top:50%;width:500px;height:500px;border-radius:50%;border:1px solid rgba(255,255,255,.07);transform:translateY(-50%)}\n  .final-inner{max-width:640px;position:relative;z-index:1}\n  .final .eyebrow{color:#72d5dc}\n  .final h2{color:#fff;font-size:52px;line-height:1.08;margin:14px 0 20px}\n  .final h2 em{color:var(--gold);font-style:italic;display:block}\n  .final p{color:#c7d4e3;font-size:17px;line-height:1.7;margin-bottom:14px;max-width:540px}\n  .final-ctas{display:flex;gap:14px;margin-top:30px;flex-wrap:wrap}\n\n  /* ——— footer ——— */\n  footer{background:#0a1a2b;color:#8ea0b5;padding:72px 0 32px;font-size:14px}\n  .foot-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:40px}\n  .foot-brand .logo{color:#fff}\n  .foot-brand .logo small{color:#72d5dc}\n  .foot-brand p{margin-top:16px;max-width:280px;line-height:1.7;color:#8ea0b5}\n  .foot-col h5{color:#fff;font-family:var(--sans);font-weight:700;font-size:12px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:18px}\n  .foot-col ul{list-style:none;display:flex;flex-direction:column;gap:10px}\n  .foot-col a:hover{color:#fff}\n  .foot-base{border-top:1px solid rgba(255,255,255,.08);margin-top:50px;padding-top:22px;display:flex;justify-content:space-between;color:#6a7c92;font-size:12px;flex-wrap:wrap;gap:12px}\n\n  /* inline icon base */\n  .ico{width:20px;height:20px;display:inline-block;vertical-align:middle;stroke-width:1.6}\n<\u002Fstyle>\n<\u002Fhead>\n<body data-screen-label=\"Homepage\">\n\n<!-- ========== UNIFIED TOP NAV ========== -->\n<nav class=\"topnav\">\n  <div class=\"wrap topnav-inner\">\n    <a href=\"#\" class=\"logo\">\n      <span class=\"logo-mark\"><\u002Fspan>\n      <span class=\"logo-wordmark\">Soma Yoga<small>Institute<\u002Fsmall><\u002Fspan>\n    <\u002Fa>\n    <div class=\"topnav-menu\">\n      <a href=\"#trainings\" class=\"has-sub\">Trainings<\u002Fa>\n      <a href=\"#\">Continuing Education<\u002Fa>\n      <a href=\"#about\">About<\u002Fa>\n      <a href=\"#story\">Our Story<\u002Fa>\n      <a href=\"#\">Contact<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"topnav-right\">\n      <a href=\"#\" class=\"login\">Log In<\u002Fa>\n      <a href=\"#\" class=\"btn btn--purple\">Enroll Now <span class=\"arr\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n<div class=\"tricolor\"><\u002Fdiv>\n\n<!-- ========== HERO ========== -->\n<header class=\"hero\" data-screen-label=\"Hero\">\n  <div class=\"hero-bg\"><\u002Fdiv>\n  <div class=\"hero-inner\">\n    <span class=\"eyebrow\">Welcome · Yoga Alliance RYT &amp; C-IAYT School<\u002Fspan>\n    <h1 class=\"h-display\">Elevate Your Practice.<br><em>Transform<\u002Fem> Your Life.<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n    <p class=\"hero-sub\">Professional Yoga Teacher Trainings &amp; Retreats<\u002Fp>\n    <p class=\"hero-lede\">Therapeutic, alignment-based programs designed to deepen your connection, expand your potential, and prepare you to teach the yoga the world needs most.<\u002Fp>\n    <div class=\"hero-ctas\">\n      <a href=\"#trainings\" class=\"btn btn--purple\">Explore Trainings <span class=\"arr\">→<\u002Fspan><\u002Fa>\n      <a href=\"#\" class=\"btn btn--ghost-light\">Schedule a Call <span class=\"arr\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ========== TRUST STRIP ========== -->\n<section class=\"trust\">\n  <div class=\"wrap trust-row\">\n    <div class=\"trust-cell\">\n      <svg class=\"trust-ico\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><circle cx=\"12\" cy=\"9\" r=\"6\"><\u002Fcircle><path d=\"M8 13l-3 8 7-4 7 4-3-8\"><\u002Fpath><\u002Fsvg>\n      <div><div class=\"trust-num\">4.89 / 5<\u002Fdiv><div class=\"trust-label\">Yoga Alliance Rating<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"trust-cell\">\n      <svg class=\"trust-ico\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"1.5\"><\u002Frect><path d=\"M3 9h18M7 14l3 3 7-7\"><\u002Fpath><\u002Fsvg>\n      <div><div class=\"trust-num\">9.6 / 10<\u002Fdiv><div class=\"trust-label\">Net Promoter Score<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"trust-cell\">\n      <svg class=\"trust-ico\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M4 21c2-3 5-5 8-5s6 2 8 5\"><\u002Fpath><circle cx=\"12\" cy=\"8\" r=\"4\"><\u002Fcircle><path d=\"M6 7l2 2M18 7l-2 2\"><\u002Fpath><\u002Fsvg>\n      <div><div class=\"trust-num\">1,000+<\u002Fdiv><div class=\"trust-label\">Certified Graduates<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"trust-cell\">\n      <svg class=\"trust-ico\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M12 3l2.5 5 5.5.8-4 3.9.9 5.5L12 15.8 7.1 18.2 8 12.7 4 8.8l5.5-.8L12 3z\"><\u002Fpath><\u002Fsvg>\n      <div><div class=\"trust-num\">C-IAYT<\u002Fdiv><div class=\"trust-label\">Certified Faculty<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"trust-cell\">\n      <svg class=\"trust-ico\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M8 12a4 4 0 118 0 4 4 0 01-8 0zM4 8c2-2 5-2 7 0s2 5 0 7-5 2-7 0-2-5 0-7zM13 9c2-2 5-2 7 0s2 5 0 7-5 2-7 0\"><\u002Fpath><\u002Fsvg>\n      <div><div class=\"trust-num\">Lifetime<\u002Fdiv><div class=\"trust-label\">Course Access<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== TRAININGS (3-up) ========== -->\n<section class=\"sec sec--cream\" id=\"trainings\" data-screen-label=\"Trainings\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <span class=\"eyebrow\">Our Programs<\u002Fspan>\n      <h2 class=\"section-title\">Find Your <em>Path<\u002Fem><\u002Fh2>\n      <div class=\"rule\"><\u002Fdiv>\n      <p class=\"section-lede\">Whether you're beginning your teaching journey, deepening an established practice, or maintaining your credentials — three pathways, one therapeutic foundation.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"tr-grid\">\n      <!-- 200hr -->\n      <article class=\"tr-card\">\n        <div class=\"tr-photo\">\n          <span class=\"tr-tag\">Online &amp; In-Person<\u002Fspan>\n          <small>photo · 200hr cohort · meditation circle<\u002Fsmall>\n        <\u002Fdiv>\n        <div class=\"tr-body\">\n          <span class=\"eyebrow\">Foundation · RYT-200<\u002Fspan>\n          <h3>200 Hour Yoga <em>Teacher Training<\u002Fem><\u002Fh3>\n          <p class=\"lede\">Lay the foundation for a lifelong practice and teaching career with our therapeutic, alignment-based curriculum.<\u002Fp>\n          <ul class=\"tr-bullets\">\n            <li>9 core modules · 200 hours<\u002Fli>\n            <li>12 weeks live cohort + lifetime access<\u002Fli>\n            <li>6 private 1:1 mentorship sessions<\u002Fli>\n            <li>Yoga Alliance RYT-200 eligible<\u002Fli>\n          <\u002Ful>\n          <div class=\"tr-foot\">\n            <div class=\"tr-price\"><span class=\"lbl\">From<\u002Fspan><span class=\"val\">$1,297<\u002Fspan><\u002Fdiv>\n            <a href=\"#\" class=\"tr-cta\">Learn More <span class=\"arr\">→<\u002Fspan><\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- 300hr -->\n      <article class=\"tr-card\">\n        <div class=\"tr-photo\" style=\"background:repeating-linear-gradient(45deg,#c9d9c7 0 10px,#b7cbb4 10px 20px)\">\n          <span class=\"tr-tag\">Advanced Training<\u002Fspan>\n          <small>photo · 300hr practitioner · outdoor asana<\u002Fsmall>\n        <\u002Fdiv>\n        <div class=\"tr-body\">\n          <span class=\"eyebrow\">Advanced · RYT-500<\u002Fspan>\n          <h3>300 Hour Yoga <em>Teacher Training<\u002Fem><\u002Fh3>\n          <p class=\"lede\">Elevate your teaching and deepen your practice with advanced sequencing, subtle anatomy, and therapeutic application.<\u002Fp>\n          <ul class=\"tr-bullets\">\n            <li>Advanced sequencing &amp; class design<\u002Fli>\n            <li>Subtle body anatomy &amp; chakras<\u002Fli>\n            <li>Therapeutic applications &amp; philosophy<\u002Fli>\n            <li>RYT-500 &amp; C-IAYT pathway<\u002Fli>\n          <\u002Ful>\n          <div class=\"tr-foot\">\n            <div class=\"tr-price\"><span class=\"lbl\">From<\u002Fspan><span class=\"val\">$1,997<\u002Fspan><\u002Fdiv>\n            <a href=\"#\" class=\"tr-cta\">Learn More <span class=\"arr\">→<\u002Fspan><\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- CE -->\n      <article class=\"tr-card\">\n        <div class=\"tr-photo\" style=\"background:repeating-linear-gradient(45deg,#cfd8e4 0 10px,#bcc8d7 10px 20px)\">\n          <span class=\"tr-tag\">YACEP · On-Demand<\u002Fspan>\n          <small>photo · continuing education · therapist &amp; student<\u002Fsmall>\n        <\u002Fdiv>\n        <div class=\"tr-body\">\n          <span class=\"eyebrow\">Continuing Education<\u002Fspan>\n          <h3>Yoga Alliance <em>CE Online<\u002Fem><\u002Fh3>\n          <p class=\"lede\">Maintain your credential and grow your skill with well-crafted live and on-demand classes from C-IAYT faculty.<\u002Fp>\n          <ul class=\"tr-bullets\">\n            <li>Live schedule + on-demand library<\u002Fli>\n            <li>Therapeutic, anatomy &amp; philosophy<\u002Fli>\n            <li>Yoga Alliance CEU credits<\u002Fli>\n            <li>Start anytime · self-paced<\u002Fli>\n          <\u002Ful>\n          <div class=\"tr-foot\">\n            <div class=\"tr-price\"><span class=\"lbl\">From<\u002Fspan><span class=\"val\">$39<em>/course<\u002Fem><\u002Fspan><\u002Fdiv>\n            <a href=\"#\" class=\"tr-cta\">Browse Catalog <span class=\"arr\">→<\u002Fspan><\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== WHY SOMA (quick strip) ========== -->\n<section class=\"why\">\n  <div class=\"wrap why-grid\">\n    <div class=\"why-cell\">\n      <svg class=\"why-ico\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 3v18M3 12h18M5 7c4 3 10 3 14 0M5 17c4-3 10-3 14 0\"><\u002Fpath><\u002Fsvg>\n      <h4>Therapeutic Foundation<\u002Fh4>\n      <p>Every program is grounded in C-IAYT therapeutic yoga — safe, clinical, deeply embodied.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"why-cell\">\n      <svg class=\"why-ico\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\"><path d=\"M12 3C8 7 8 12 12 16c4-4 4-9 0-13zM12 16v5M7 21h10\"><\u002Fpath><\u002Fsvg>\n      <h4>Real Mentorship<\u002Fh4>\n      <p>Small cohorts, direct 1:1 feedback, and decades of teaching wisdom — not a course you watch alone.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"why-cell\">\n      <svg class=\"why-ico\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"M3 10h18M8 5v-2M16 5v-2\"><\u002Fpath><\u002Fsvg>\n      <h4>Start Anytime<\u002Fh4>\n      <p>Four cohort dates a year plus always-on CE — begin exactly when your life makes room.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"why-cell\">\n      <svg class=\"why-ico\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\"><path d=\"M3 21V7l9-4 9 4v14M9 21v-7h6v7M7 11h2M15 11h2\"><\u002Fpath><\u002Fsvg>\n      <h4>Credentials That Carry<\u002Fh4>\n      <p>Graduates earn Yoga Alliance RYT-200/500 and pathways to the C-IAYT designation.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== YACEP (navy feature) ========== -->\n<section class=\"yacep\" data-screen-label=\"CE Spotlight\">\n  <div class=\"wrap yacep-inner\">\n    <div>\n      <span class=\"eyebrow\">YACEP · Yoga Alliance Provider<\u002Fspan>\n      <h2>Continuing Education,<br><em>Crafted for Teachers.<\u002Fem><\u002Fh2>\n      <div class=\"rule-left\"><\u002Fdiv>\n      <p class=\"yacep-lede\">We're a Yoga Alliance Continuing Education Provider. Choose from live labs and on-demand intensives — grow your knowledge to better serve your community, and stand out as the well-educated, therapeutic teacher students are looking for.<\u002Fp>\n      <p class=\"yacep-lede\">Use yoga as a tool for creating vibrant wellbeing in body, mind, brain, and spirit.<\u002Fp>\n      <div class=\"yacep-ctas\">\n        <a href=\"#\" class=\"btn btn--teal\">See the Live Schedule <span class=\"arr\">→<\u002Fspan><\u002Fa>\n        <a href=\"#\" class=\"btn btn--ghost-light\">Start On-Demand <span class=\"arr\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"yacep-card\">\n      <h4>Upcoming Live Sessions<\u002Fh4>\n      <div class=\"yacep-row\"><strong>Therapeutic Low Back<\u002Fstrong><span>May 7 · 10a PT<\u002Fspan><\u002Fdiv>\n      <div class=\"yacep-row\"><strong>Yin &amp; Fascia Intensive<\u002Fstrong><span>May 21 · 10a PT<\u002Fspan><\u002Fdiv>\n      <div class=\"yacep-row\"><strong>Pranayama Lab<\u002Fstrong><span>Jun 4 · 10a PT<\u002Fspan><\u002Fdiv>\n      <div class=\"yacep-row\"><strong>Restorative Deep Dive<\u002Fstrong><span>Jun 18 · 10a PT<\u002Fspan><\u002Fdiv>\n      <div class=\"yacep-row\" style=\"background:transparent;color:#9fb9d1;font-size:12px;justify-content:center\">Recordings included with every live session.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== TESTIMONIALS ========== -->\n<section class=\"sec sec--cream\" data-screen-label=\"Testimonials\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <span class=\"eyebrow\">Graduate Stories<\u002Fspan>\n      <h2 class=\"section-title\">Student <em>Success<\u002Fem> Stories<\u002Fh2>\n      <div class=\"rule\"><\u002Fdiv>\n      <p class=\"section-lede\">Hear from our graduates about their transformative experiences with Soma Yoga Institute.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"testi-grid\">\n      <div class=\"testi\">\n        <div class=\"stars\">★★★★★<\u002Fdiv>\n        <blockquote>This 300 Hour Yoga Teacher Training was a life-changing experience. All of the teachers were super wise, the group was so sweet and connected, and the schedule was very well paced. Liz's knowledge is incredible and really shines through in each of her lessons. I give this program an A++!<\u002Fblockquote>\n        <div class=\"testi-foot\">\n          <div class=\"testi-av\"><\u002Fdiv>\n          <div>\n            <div class=\"testi-name\">KT O'Brien<\u002Fdiv>\n            <div class=\"testi-role\">300 Hour YTT Graduate<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"testi\">\n        <div class=\"stars\">★★★★★<\u002Fdiv>\n        <blockquote>This yoga teacher training was the most impactful, complete yoga experience ever. The alignment lessons were a living anatomy class. The stories and chanting nourished the soul and the heartfelt compassion and caring empowered everyone.<\u002Fblockquote>\n        <div class=\"testi-foot\">\n          <div class=\"testi-av\" style=\"background:linear-gradient(135deg,#2ba9b4,#1a3a5c)\"><\u002Fdiv>\n          <div>\n            <div class=\"testi-name\">Dave Martin<\u002Fdiv>\n            <div class=\"testi-role\">Yoga Teacher Training Graduate<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"testi\">\n        <div class=\"stars\">★★★★★<\u002Fdiv>\n        <blockquote>Soma Yoga Institute provides brilliant courses for different aspects of yoga. I took my 200hr training with them and have also just completed my second year of the Yoga SAFE course. I highly recommend Soma Yoga Institute and can't thank them enough for all they have brought to my life.<\u002Fblockquote>\n        <div class=\"testi-foot\">\n          <div class=\"testi-av\" style=\"background:linear-gradient(135deg,#4a2458,#c9a876)\"><\u002Fdiv>\n          <div>\n            <div class=\"testi-name\">Oona Matheson<\u002Fdiv>\n            <div class=\"testi-role\">200 Hour YTT Graduate<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== ABOUT US ========== -->\n<section class=\"sec\" data-screen-label=\"About\">\n  <div class=\"wrap split\">\n    <div class=\"split-img\">\n      <div class=\"frame\"><small>photo · about us · faculty + community circle<\u002Fsmall><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"split-copy\">\n      <span class=\"eyebrow\">About Soma<\u002Fspan>\n      <h2>Yoga as a <em>Pathway<\u002Fem> to Transformation<\u002Fh2>\n      <div class=\"rule-left\"><\u002Fdiv>\n      <p>At Soma Yoga Institute, we believe yoga is more than a physical practice — it's a pathway to profound personal transformation and holistic well-being. Our mission is to provide high-quality, accessible, and deeply authentic yoga education.<\u002Fp>\n      <p>We offer a welcoming, inclusive community where students from all walks of life can explore their practice, discover their unique voice, and step into their power as teachers and leaders in the wellness space.<\u002Fp>\n      <a href=\"#\" class=\"btn btn--purple cta\">Meet Our Team <span class=\"arr\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== OUR STORY ========== -->\n<section class=\"sec sec--cream\" data-screen-label=\"Story\">\n  <div class=\"wrap split reverse\">\n    <div class=\"split-copy\">\n      <span class=\"eyebrow\">Our Story<\u002Fspan>\n      <h2>Born from a <em>Shared Vision<\u002Fem><\u002Fh2>\n      <div class=\"rule-left\"><\u002Fdiv>\n      <p>Soma Yoga Institute was born from a shared vision to create a sanctuary for deep learning and healing. Years ago, our founders recognized a need for yoga trainings that honored the rich traditions of the practice while integrating modern understanding of anatomy and trauma-informed methodologies.<\u002Fp>\n      <p>What started as small local workshops has blossomed into a global community. We have guided thousands of students through our 200-hour and 300-hour programs, witnessing incredible journeys of self-discovery and empowerment.<\u002Fp>\n      <a href=\"#\" class=\"btn btn--ghost cta\">Read Full Story <span class=\"arr\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n    <div class=\"split-img\">\n      <div class=\"frame\" style=\"background:repeating-linear-gradient(135deg,#c3d6d8 0 12px,#a8c2c4 12px 24px);aspect-ratio:1/1\"><small>photo · founders at beach retreat<\u002Fsmall><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== FINAL CTA ========== -->\n<section class=\"final\" data-screen-label=\"Final CTA\">\n  <div class=\"wrap final-inner\">\n    <span class=\"eyebrow\">— Begin Your Journey<\u002Fspan>\n    <h2>Ready to Step Into<em>the Teacher You Were Meant to Be?<\u002Fem><\u002Fh2>\n    <p>Three pathways — 200 Hour, 300 Hour, and YACEP Continuing Education. Each built on the same therapeutic foundation, each guided by C-IAYT faculty, each designed to prepare you for real bodies and real teaching.<\u002Fp>\n    <p style=\"color:#9fb9d1;font-size:15px\">Not sure which path is right? Schedule a free 15-minute call — no cost, no pressure, just a real conversation.<\u002Fp>\n    <div class=\"final-ctas\">\n      <a href=\"#\" class=\"btn btn--teal\">Apply Now <span class=\"arr\">→<\u002Fspan><\u002Fa>\n      <a href=\"#\" class=\"btn btn--gold\">Schedule a Call <span class=\"arr\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== FOOTER ========== -->\n<footer>\n  <div class=\"wrap foot-grid\">\n    <div class=\"foot-brand\">\n      <a href=\"#\" class=\"logo\" style=\"color:#fff\">\n        <span class=\"logo-mark\"><\u002Fspan>\n        <span class=\"logo-wordmark\">Soma Yoga<small>Institute<\u002Fsmall><\u002Fspan>\n      <\u002Fa>\n      <p>Empowering individuals through authentic, accessible, and transformational yoga education. Join our global community today.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"foot-col\">\n      <h5>Trainings<\u002Fh5>\n      <ul>\n        <li><a href=\"#\">200 Hour YTT<\u002Fa><\u002Fli>\n        <li><a href=\"#\">300 Hour YTT<\u002Fa><\u002Fli>\n        <li><a href=\"#\">In-Person YTT<\u002Fa><\u002Fli>\n        <li><a href=\"#\">Kids YTT<\u002Fa><\u002Fli>\n        <li><a href=\"#\">YACEP Online<\u002Fa><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"foot-col\">\n      <h5>Institute<\u002Fh5>\n      <ul>\n        <li><a href=\"#\">About U
